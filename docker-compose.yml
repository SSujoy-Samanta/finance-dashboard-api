version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dashboard-api
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      - finance-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  finance-network:
    driver: bridge
